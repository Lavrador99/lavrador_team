services:
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    shm_size: 1g
    restart: on-failure
    command: ["postgres", "-c", "max_connections=200"]
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lavrador_team
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lavrador_team"]
      interval: 5s
      timeout: 3s
      retries: 20

  pg-admin:
    image: dpage/pgadmin4
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5558:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@lavrador.pt
      - PGADMIN_DEFAULT_PASSWORD=lavrador
    volumes:
      - ./docker/pgadmin/lib:/var/lib/pgadmin

